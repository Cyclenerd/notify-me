name: "Test Container"

on:
  push:
    paths:
      - 'Dockerfile'
      - '*.pl'
      - '.github/workflows/docker-test.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '*.pl'
      - '.github/workflows/docker-test.yml'

  workflow_dispatch:

jobs:
  test:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: cyclenerd/notify-me:test

      - name: Smoke test
        run: docker run --rm cyclenerd/notify-me:test pushover.pl --version
